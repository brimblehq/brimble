version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:20.11
    environment:
      PKG_OUTPUT: builds

jobs:
  build_and_release:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Set up Git
          command: |
            git config --global user.email "dave@brimble.app"
            git config --global user.name "Muritala David"
      - restore_cache:
          keys:
            - v1-yarn-deps-{{ checksum "yarn.lock" }}
            - v1-yarn-deps-
      - run:
          name: Install dependencies
          command: yarn install --frozen-lockfile
      - save_cache:
          key: v1-yarn-deps-{{ checksum "yarn.lock" }}
          paths:
            - node_modules
            - ~/.cache/yarn
      - run:
          name: Install pkg globally
          command: yarn global add pkg
      - run:
          name: Build cli
          command: yarn install --frozen-lockfile && yarn build
      - run:
          name: Build for target platforms
          command: yarn pre:release
      # - run:
      #     name: Setup GitHub CLI
      #     command: |
      #       sudo apt-get update && sudo apt-get install -y curl
      #       curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      #       echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
      #       sudo apt update && sudo apt install gh -y
      # - run:
      #     name: Create GitHub release
      #     command: |
      #       gh release create $CIRCLE_TAG \
      #         --title "Release $CIRCLE_SHA1" \
      #         --notes "Build artifacts: macos, linux & windows" \
      #         builds/*
      - run:
          name: Install AWS CLI
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
      - run:
          name: Upload install.sh to S3
          command: |
            aws s3 cp install.sh s3://${AWS_S3_BUCKET}/install.sh \
              --acl public-read \
              --content-type "text/plain"
      - run:
          name: Upload binaries to S3
          command: |
            aws s3 cp builds/ s3://${AWS_S3_BUCKET}/builds/ \
              --acl public-read \
              --recursive
      - run:
          name: Final clean up
          command: rm -rf builds awscliv2.zip aws

workflows:
  version: 2
  build_and_release_workflow:
    jobs:
      - build_and_release:
          filters:
            branches:
              ignore: main
            tags:
              only: /^v.*/
